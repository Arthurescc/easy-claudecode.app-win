name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          npm ci

      - name: Static checks
        run: |
          .\.venv\Scripts\python.exe -m py_compile services/backend/app.py services/backend/claude_console_utils.py
          .\.venv\Scripts\python.exe .github/scripts/check_inline_js.py apps/web/claude-console.html
          node --test qa/router/custom-router.test.cjs qa/windows-release/frontend-install-surface.test.cjs qa/windows-release/readme-bootstrap-surface.test.cjs qa/windows-release/release-workflow.test.cjs qa/windows-release/library-collapse-surface.test.cjs qa/windows-release/startup-setup-surface.test.cjs
          .\qa\windows-release\common-env-home-expansion-smoke.ps1
          .\qa\windows-release\install-from-github-smoke.ps1
          .\qa\windows-release\provider-registry-settings-smoke.ps1
          .\qa\windows-release\provider-profile-model-catalog-smoke.ps1
          .\qa\windows-release\direct-reply-explicit-route-smoke.ps1
          .\qa\windows-release\explicit-model-no-fallback-smoke.ps1
          .\qa\windows-release\pty-compat-notice-smoke.ps1
          .\qa\windows-release\mcp-status-parse-smoke.ps1
          .\qa\windows-release\setup-status-classification-smoke.ps1
          .\qa\windows-release\unsupported-model-warning-smoke.ps1
          .\qa\windows-release\launcher-shortcut-self-heal-smoke.ps1
          .\qa\windows-release\settings-default-route-smoke.ps1
          node --check services/backend/claude_code_dashscope_proxy.js
          node --check config/router/custom-router.js
          .\scripts\sync-router.ps1

      - name: Windows launcher smoke test
        run: |
          $env:EASY_CLAUDECODE_SHORTCUT_DESKTOP_DIR = Join-Path $env:RUNNER_TEMP "desktop"
          $env:EASY_CLAUDECODE_SHORTCUT_PATH = Join-Path $env:EASY_CLAUDECODE_SHORTCUT_DESKTOP_DIR "Claude Code.app.lnk"
          .\scripts\install-desktop-shortcut.ps1
          .\scripts\install-cc-launcher.ps1
          if (-not (Test-Path $env:EASY_CLAUDECODE_SHORTCUT_PATH)) {
              throw "desktop shortcut was not created"
          }
          if (-not (Test-Path ".\apps\desktop-windows\bin\Claude Code.app.exe")) {
              throw "desktop launcher exe was not created"
          }
          $shortcut = (New-Object -ComObject WScript.Shell).CreateShortcut($env:EASY_CLAUDECODE_SHORTCUT_PATH)
          if (-not $shortcut.TargetPath.EndsWith(".exe")) {
              throw "desktop shortcut target is not an exe"
          }
          if (-not (Test-Path "$HOME\.local\bin\cc.cmd")) {
              throw "cc.cmd was not installed"
          }

      - name: Windows release smoke test
        run: |
          .\qa\windows-release\package-release-smoke.ps1

      - name: Backend smoke test
        run: |
          $env:EASY_CLAUDECODE_HOME = Join-Path $env:RUNNER_TEMP "easy-home"
          $env:CLAUDE_CONSOLE_PYTHON_BIN = (Resolve-Path ".\.venv\Scripts\python.exe").Path
          $env:EASY_POWERSHELL_BIN = if (Get-Command pwsh -ErrorAction SilentlyContinue) { "pwsh" } else { "powershell" }
          Copy-Item .env.example .env
          $scriptPath = (Resolve-Path ".\scripts\run-claude-console.ps1").Path
          $backendStdoutLog = Join-Path $env:RUNNER_TEMP "claude-console-backend.stdout.log"
          $backendStderrLog = Join-Path $env:RUNNER_TEMP "claude-console-backend.stderr.log"
          $backend = Start-Process $env:EASY_POWERSHELL_BIN -ArgumentList @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", $scriptPath) -WorkingDirectory $PWD -PassThru -RedirectStandardOutput $backendStdoutLog -RedirectStandardError $backendStderrLog
          try {
              $healthy = $false
              for ($i = 0; $i -lt 45; $i++) {
                  try {
                      $response = Invoke-WebRequest -Uri "http://127.0.0.1:18882/health" -UseBasicParsing -TimeoutSec 2
                      if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) {
                          $healthy = $true
                          break
                      }
                  } catch {
                  }
                  Start-Sleep -Seconds 1
              }
              if (-not $healthy) {
                  if (Test-Path $backendStdoutLog) {
                      Write-Host "----- backend stdout -----"
                      Get-Content $backendStdoutLog
                      Write-Host "--------------------------"
                  }
                  if (Test-Path $backendStderrLog) {
                      Write-Host "----- backend stderr -----"
                      Get-Content $backendStderrLog
                      Write-Host "--------------------------"
                  }
                  throw "backend did not become healthy in time"
              }
              Invoke-WebRequest -Uri "http://127.0.0.1:18882/health" -UseBasicParsing | Select-Object -ExpandProperty Content
              Invoke-WebRequest -Uri "http://127.0.0.1:18882/claude-console/status" -UseBasicParsing | Select-Object -ExpandProperty Content
              $bootstrapRaw = Invoke-WebRequest -Uri "http://127.0.0.1:18882/claude-console/bootstrap" -UseBasicParsing | Select-Object -ExpandProperty Content
              $bootstrap = $bootstrapRaw | ConvertFrom-Json
              if (-not $bootstrap.ok) {
                  throw "bootstrap returned ok=false"
              }
              if (-not $bootstrap.webDefaults.locale) {
                  throw "bootstrap missing locale"
              }
              if (-not $bootstrap.installers.everythingClaudeCode.available) {
                  throw "bootstrap missing Everything Claude Code installer metadata"
              }
              Write-Host ("bootstrap locale: " + $bootstrap.webDefaults.locale)
          } finally {
              if ($backend -and -not $backend.HasExited) {
                  Stop-Process -Id $backend.Id -Force
              }
          }
