<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Console</title>
    <meta http-equiv="refresh" content="0; url=/claude-console">
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(214, 127, 92, 0.09), transparent 28%),
                linear-gradient(180deg, #f7f3ed 0%, #f4f0e7 48%, #efeadf 100%);
            color: #312d28;
            font-family: "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }

        .card {
            width: min(560px, 100%);
            padding: 32px 28px;
            border-radius: 28px;
            background: rgba(255, 252, 247, 0.92);
            border: 1px solid rgba(112, 103, 92, 0.14);
            box-shadow: 0 14px 40px rgba(71, 57, 42, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px;
            line-height: 1.1;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: #7c7368;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            padding: 12px 18px;
            border-radius: 16px;
            background: linear-gradient(135deg, #d67f5c, #e5a286);
            color: #fff8f4;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Claude Console</h1>
        <p>这里是独立的 Claude 控制台入口。页面会自动跳转。</p>
        <a href="/claude-console">进入控制台</a>
    </main>
</body>
</html>
