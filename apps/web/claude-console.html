            const toolBlocks = blocks.filter((block) => block.type === 'tool_use' || block.type === 'tool_result');
            const textBlocks = blocks.filter((block) => block.type === 'text' && block.text);
            const isOpen = !!appState.thinkingExpanded[String(messageId || '')];
            const thinkingCharCount = thinkingBlocks.reduce((total, item) => total + String(item.text || '').length, 0);

            const thinkingHtml = thinkingBlocks.length ? `
                <div class="thinking-wrap ${isOpen ? 'is-open' : ''}" data-thinking-message-id="${escapeHtml(messageId || '')}">

                messageId,

            })).join('');

                                </div>
                                ${renderLargeTextBlock(block.text || '', {

                                    limit: LARGE_TOOL_PREVIEW_LIMIT,
                                    className: 'tool-json',
                                })}

        function getMessageCopyText(messageId) {
            const message = selectedMessages().find((item) => String(item.id || '') === String(messageId || ''));
            if (!message) return '';
            const blocks = Array.isArray(message.blocks) ? message.blocks : [];
            const lines = [];
            blocks.forEach((block) => {
                if (!block) return;
                if (block.type === 'text' && block.text) {
                    lines.push(String(block.text).trim());
                } else if (block.type === 'tool_result' && block.text) {
                    lines.push(String(block.text).trim());
                } else if (block.type === 'tool_use') {
                    lines.push(`[工具调用] ${block.name || '工具'}`);
                    if (block.input) {
                        lines.push(JSON.stringify(block.input, null, 2));
                    }
                }
            });
            return lines.filter(Boolean).join('\n\n').trim();
        }

        async function copyMessage(messageId) {
            const text = getMessageCopyText(messageId);
            if (!text) return;
            await navigator.clipboard.writeText(text);
        }

        function selectMessageContent(messageId) {
            const target = document.querySelector(`.message-card[data-message-id="${CSS.escape(String(messageId || ''))}"] .message-copy-scope`);
            if (!target) return;
            const selection = window.getSelection();

            range.selectNodeContents(target);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        function computeMessageFingerprint(messages) {
            return (Array.isArray(messages) ? messages : []).map((message) => {
                const blocks = Array.isArray(message?.blocks) ? message.blocks : [];
                const blockSig = blocks.map((block) => `${block?.type || ''}:${String(block?.text || block?.name || '').length}`).join(',');
                return `${message?.id || ''}:${message?.role || ''}:${blockSig}`;
            }).join('|');
        }

        function messageShouldStickToBottom(container) {
            if (!container) return true;
            const gap = container.scrollHeight - (container.scrollTop + container.clientHeight);
            return gap < 72;

            if (!messagesNode) return;

                node.classList.toggle('is-focused', String(node.dataset.messageId || '') === String(appState.focusedMessageId || ''));

                renderMessages();

        function renderMessages() {

            const windowBanner = visibleState.hiddenBefore > 0 ? `

                    <div class="message-window-actions">
                        <button class="message-inline-btn" type="button" data-load-more-messages="${escapeHtml(String(MESSAGE_WINDOW_STEP))}">加载更早 ${escapeHtml(String(MESSAGE_WINDOW_STEP))} 条</button>

        async function apiJson(url, options = {}) {
            const response = await fetch(url, options);
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.ok === false) {
                throw new Error(payload.msg || `请求失败（状态 ${response.status}）`);
            }
            return payload;
        }

        async function loadBootstrap({ keepSelection = true, preserveCurrent = false, background = false, skipSessionReload = false } = {}) {
            if (!background) {
                appState.bootstrapLoading = true;
                renderSidebar();
                updateTopBadges();
            }
            const payload = await apiJson(`/claude-console/bootstrap?includeArchived=${appState.showArchived ? 1 : 0}`);
            const changed = applyBootstrapPayload(payload);
            appState.bootstrapLoading = false;
            appState.lastFullBootstrapAt = Date.now();
            saveBootstrapCache(payload);
            if (!background || changed) {
                renderModelOptions();
                renderAgentModeOptions();
                document.getElementById('permission-mode').value = appState.permissionMode;
                document.getElementById('model-route').value = appState.mode;
                document.getElementById('agent-mode').value = appState.agentMode;
                if (background && shouldDeferSidebarRender()) {
                    appState.sidebarRenderPending = true;
                    queueDeferredSidebarRender();
                } else {
                    renderSidebar({ force: !!background });
                }
                renderAttachments();
                updateTopBadges();
            }

            const selectionStillExists = appState.selectedSessionId && appState.sessions.some((item) => item.sessionId === appState.selectedSessionId);
            if (keepSelection && selectionStillExists && !skipSessionReload) {
                await loadSession(appState.selectedSessionId, { silent: true });
                return;
            }
            if (!keepSelection || !selectionStillExists) {
                if (preserveCurrent && appState.currentSession?.session) {
                    appState.selectedSessionId = appState.currentSession.session.sessionId || appState.selectedSessionId || null;
                } else {
                    appState.selectedSessionId = null;
                }
                if (!preserveCurrent) {
                    appState.currentSession = { session: null, messages: [] };
                }
                renderMessages();
                renderSidebar({ force: true });
            }
        }

        async function loadPoll() {
            const payload = await apiJson(`/claude-console/poll?includeArchived=${appState.showArchived ? 1 : 0}`);
            const changed = applyPollPayload(payload);
            if (changed) {
                if (shouldDeferSidebarRender()) {
                    appState.sidebarRenderPending = true;
                    queueDeferredSidebarRender();
                } else {
                    renderSidebar();
                }
                updateTopBadges();
            }
            return changed;
        }

        function currentSessionUpdatedAt() {

        }

        function currentOpenclawDispatchSignature() {
            const dispatch = appState.bootstrap?.openclawDispatch || {};
            return JSON.stringify({
                queueLength: dispatch?.queueLength || 0,
                active: dispatch?.active?.dispatchId || '',
                activeStartedAt: dispatch?.active?.startedAt || '',
                historyTail: Array.isArray(dispatch?.history)
                    ? dispatch.history.slice(-3).map((item) => [item?.dispatchId || '', item?.finishedAt || '', item?.ok ? '1' : '0'].join('~'))
                    : [],
            });
        }

        function openclawFixedSessionId() {
            return String(appState.bootstrap?.sessionStore?.openclawOpsSessionId || '').trim();
        }

        async function backgroundRefreshTick() {
            if (
                document.hidden
                || appState.isStreaming
                || appState.bootstrapLoading
                || appState.backgroundRefreshRunning
                || shouldDeferSidebarRender()
            ) {
                return;
            }
            appState.backgroundRefreshRunning = true;
            const selectedSessionId = String(appState.selectedSessionId || '').trim();
            const fixedOpenclawSessionId = openclawFixedSessionId();
            const beforeMap = new Map((appState.sessions || []).map((item) => [String(item.sessionId || ''), String(item.updatedAt || '')]));
            const beforeSelectedUpdatedAt = selectedSessionId ? (beforeMap.get(selectedSessionId) || currentSessionUpdatedAt()) : '';
            const beforeDispatchSignature = currentOpenclawDispatchSignature();
            try {
                const shouldRunFullBootstrap =
                    appState.sidebarView !== 'threads'
                    || !appState.lastFullBootstrapAt
                    || (Date.now() - appState.lastFullBootstrapAt) >= FULL_BOOTSTRAP_REFRESH_MS;
                if (shouldRunFullBootstrap) {
                    await loadBootstrap({
                        keepSelection: true,
                        preserveCurrent: true,
                        background: true,
                        skipSessionReload: true,
                    });
                } else {
                    await loadPoll();
                }
                const afterDispatchSignature = currentOpenclawDispatchSignature();
                if (selectedSessionId) {
                    const afterSelected = (appState.sessions || []).find((item) => String(item.sessionId || '') === selectedSessionId);
                    const afterUpdatedAt = String(afterSelected?.updatedAt || '').trim();
                    const openclawDispatchChanged = selectedSessionId === fixedOpenclawSessionId
                        && afterDispatchSignature !== beforeDispatchSignature;
                    if ((afterUpdatedAt && afterUpdatedAt !== beforeSelectedUpdatedAt) || openclawDispatchChanged) {
                        await loadSessionWithRetry(selectedSessionId, { silent: true, attempts: 3, waitMs: 140 });
                    }
                }
            } catch (error) {
                if (!isTransientFetchError(error)) {
                    console.warn('background refresh failed', error);
                }
            } finally {
                appState.backgroundRefreshRunning = false;
            }
        }

        function startBackgroundRefresh() {
            if (appState.backgroundRefreshTimer) {
                window.clearInterval(appState.backgroundRefreshTimer);
            }
            appState.backgroundRefreshTimer = window.setInterval(() => {
                backgroundRefreshTick().catch((error) => console.warn('background refresh tick failed', error));
            }, BACKGROUND_REFRESH_MS);
        }

        async function sleepMs(ms) {
            return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        function isTransientFetchError(error) {
            const message = error instanceof Error ? error.message : String(error || '');
            return /failed to fetch/i.test(message) || /networkerror/i.test(message);
        }

        async function loadSession(sessionId, { silent = false } = {}) {
            const safeSessionId = String(sessionId || '').trim();
            if (!safeSessionId) return;
            const token = ++appState.sessionLoadToken;
            const summary = appState.sessions.find((item) => item.sessionId === safeSessionId) || null;
            const cached = appState.sessionDetailCache[safeSessionId];
            if (appState.sessionLoadController) {
                try {
                    appState.sessionLoadController.abort();
                } catch (error) {
                    console.warn('session load abort failed', error);
                }
            }
            const controller = new AbortController();
            appState.sessionLoadController = controller;
            appState.selectedSessionId = safeSessionId;
            appState.sessionLoadingId = safeSessionId;
            if (cached) {
                appState.currentSession = {
                    session: {
                        ...cached.session,
                        ...(summary || {}),
                    },
                    messages: Array.isArray(cached.messages) ? cached.messages : [],
                };
                renderSidebar();
                scheduleMessagesRender({ force: true });
                if (!silent) updateTopBadges();
                if (String(cached.updatedAt || '') === String(summary?.updatedAt || '')) {
                    appState.sessionLoadingId = null;
                    renderSidebar();
                    return;
                }
            } else {
                renderSidebar();
            }

            try {
                const payload = await apiJson(`/claude-console/sessions/${encodeURIComponent(safeSessionId)}`, {
                    signal: controller.signal,
                });
                if (token !== appState.sessionLoadToken || controller.signal.aborted) return;
                const normalizedSession = normalizeSessionSummary(payload.session || {});
                appState.selectedSessionId = safeSessionId;
                appState.currentSession = {
                    session: normalizedSession,
                    messages: Array.isArray(payload.messages) ? payload.messages : [],
                };
                cacheSessionDetail(safeSessionId, normalizedSession, payload.messages || []);
                appState.sessionLoadingId = null;
                renderSidebar();
                scheduleMessagesRender({ force: true });
                if (!silent) updateTopBadges();
            } catch (error) {
                if (controller.signal.aborted || String(error?.name || '') === 'AbortError') {
                    return;
                }
                throw error;
            } finally {
                if (appState.sessionLoadController === controller) {
                    appState.sessionLoadController = null;
                }
                if (token === appState.sessionLoadToken && appState.sessionLoadingId === safeSessionId) {
                    appState.sessionLoadingId = null;
                    renderSidebar();
                }
            }
        }

        async function loadSessionWithRetry(sessionId, { silent = false, attempts = 6, waitMs = 250 } = {}) {
            let lastError = null;
            for (let index = 0; index < attempts; index += 1) {
                try {
                    await loadSession(sessionId, { silent });
                    return;
                } catch (error) {
                    lastError = error;
                    if (index < attempts - 1) {
                        await sleepMs(waitMs);
                    }
                }
            }
            throw lastError;
        }

        async function saveSessionMeta(sessionId, patch, { action = 'save' } = {}) {
            const safeSessionId = String(sessionId || '').trim();
            if (!safeSessionId) return;
            const sessionsBackup = deepClone(appState.sessions);
            const currentBackup = deepClone(appState.currentSession);
            const normalizedPatch = { ...patch };
            if ('folder' in normalizedPatch) {
                normalizedPatch.folder = normalizeFolderName(normalizedPatch.folder);
            }
            setSessionActionPending(safeSessionId, action);
            updateSessionLocally(safeSessionId, normalizedPatch);
            renderSidebar();
            renderMessages();
            try {
                const payload = await apiJson('/claude-console/session-meta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: safeSessionId, ...normalizedPatch }),
                });
                updateSessionLocally(safeSessionId, payload?.meta || normalizedPatch);
                renderSidebar();
                renderMessages();
                scheduleBackgroundSync();
                return payload;
            } catch (error) {
                appState.sessions = sessionsBackup;
                appState.currentSession = currentBackup;
                renderSidebar();
                renderMessages();
                throw error;
            } finally {
                setSessionActionPending(safeSessionId, '');
            }
        }

        async function revealPath(path) {
            if (!path) return;
            await apiJson('/claude-console/reveal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path }),
            });
        }

        async function deleteAutomation(automationId, sourceKind = 'codex-automation') {
            if (!automationId) return;
            const query = new URLSearchParams({ source: sourceKind });
            await apiJson(`/claude-console/automations/${encodeURIComponent(automationId)}?${query.toString()}`, {
                method: 'DELETE',
            });
            await loadBootstrap({ keepSelection: true, preserveCurrent: true });
        }

        async function deleteSession(sessionId) {
            const safeSessionId = String(sessionId || '').trim();
            if (!safeSessionId) return;
            const deletingSelected = appState.selectedSessionId === safeSessionId;
            const sessionsBackup = deepClone(appState.sessions);
            const currentBackup = deepClone(appState.currentSession);
            const selectedBackup = appState.selectedSessionId;
            setSessionActionPending(safeSessionId, 'delete');
            removeSessionLocally(safeSessionId);
            if (deletingSelected) {
                appState.selectedSessionId = null;
                renderMessages();
            }
            renderSidebar();
            try {
                await apiJson(`/claude-console/sessions/${encodeURIComponent(safeSessionId)}`, {
                    method: 'DELETE',
                });
                scheduleBackgroundSync();
            } catch (error) {
                appState.sessions = sessionsBackup;
                appState.currentSession = currentBackup;
                appState.selectedSessionId = selectedBackup;
                renderSidebar();
                renderMessages();
                throw error;
            } finally {
                setSessionActionPending(safeSessionId, '');
            }
        }

        function newDraftConversation() {
            appState.sidebarView = 'threads';
            appState.selectedSessionId = null;
            appState.attachments = [];
            appState.currentSession = {
                session: {
                    title: '新对话',
                    topic: '通用对话',
                    isDraft: true,
                },
                messages: [],
            };
            renderAttachments();
            renderSidebar();
            renderMessages();
        }

        function ensureDraftAssistant() {
            const draft = {
                id: `draft-${Date.now()}`,
                role: 'assistant',
                timestamp: new Date().toISOString(),
                model: '',
                blocks: [],
            };
            appState.currentSession.messages.push(draft);
            return draft;
        }

        function appendUserMessage(text, attachments = []) {
            const attachmentNote = attachments.length
                ? `\n\n已附文件：\n${attachments.map((item) => `- ${item.name || '附件'}`).join('\n')}`
                : '';
            const message = {
                id: `user-${Date.now()}`,
                role: 'user',
                timestamp: new Date().toISOString(),
                model: '',
                blocks: [{ type: 'text', text: `${text}${attachmentNote}` }],
            };
            appState.currentSession.messages.push(message);
        }

        function appendToolResultToDraft(draft, event) {
            draft.blocks.push({
                type: 'tool_result',
                text: event.rawText || event.summary || JSON.stringify(event.content || {}, null, 2),
                isError: false,
                toolUseId: '',
            });
        }

        async function uploadFiles(fileList) {
            const files = Array.from(fileList || []).filter(Boolean);
            if (!files.length) return;
            const formData = new FormData();
            files.forEach((file) => formData.append('files', file));
            const response = await fetch('/claude-console/upload', {
                method: 'POST',
                body: formData,
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.ok === false) {
                throw new Error(payload.msg || `上传失败（状态 ${response.status}）`);
            }
            appState.attachments = [...appState.attachments, ...(payload.items || [])];
            renderAttachments();
            updateTopBadges();
        }

        async function sendMessage() {
            const input = document.getElementById('composer-input');
            const prompt = input.value.trim();
            if (!prompt || appState.isStreaming) return;
            const queuedAttachments = [...appState.attachments];
            const busyRun = findBusyRunForSession(appState.selectedSessionId);
            const forkForSystemSession = shouldForkSessionForManualChat(appState.selectedSessionId);
            const requestSessionId = (busyRun || forkForSystemSession) ? '' : appState.selectedSessionId;

            if (!appState.currentSession) {
                appState.currentSession = { session: null, messages: [] };
            }
            if (!appState.currentSession.session) {
                appState.currentSession.session = {
                    title: deriveLocalTitle(prompt),
                    topic: deriveLocalTopic(prompt),
                    model: '',
                    sessionId: '',
                };
            }

            appendUserMessage(prompt, queuedAttachments);
            const draft = ensureDraftAssistant();
            if (busyRun) {
                draft.blocks.push({
                    type: 'text',
                    text: '[系统] 当前会话正在后台执行任务，已自动切到新会话继续，避免卡住。',
                });
            } else if (forkForSystemSession) {
                draft.blocks.push({
                    type: 'text',
                    text: '[系统] 当前会话属于系统事务线程，已自动切到新会话继续，避免把超长任务上下文带进手动聊天。',
                });
            }
            scheduleMessagesRender({ stickToBottom: true, force: true });

            input.value = '';
            appState.isStreaming = true;
            appState.activeRunId = null;
            updateStreamingUi();

            const response = await fetch('/claude-console/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: requestSessionId,
                    prompt,
                    attachments: queuedAttachments,
                    mode: appState.mode,
                    agentMode: appState.agentMode,
                    permissionMode: appState.permissionMode,
                }),
            });

            if (!response.ok || !response.body) {
                appState.isStreaming = false;
                updateStreamingUi();
                throw new Error(`聊天请求失败（状态 ${response.status}）`);
            }

            appState.attachments = [];
            renderAttachments();
            updateTopBadges();

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let currentTool = null;
            let finalSessionId = appState.selectedSessionId;

            const handleEvent = async (event) => {
                if (!event || !event.type) return;
                if (event.type === 'run_start') {
                    appState.activeRunId = event.runId;
                    updateStreamingUi();
                    return;
                }
                if (event.type === 'session') {
                    finalSessionId = event.sessionId || finalSessionId;
                    if (finalSessionId && !appState.selectedSessionId) {
                        appState.selectedSessionId = finalSessionId;
                    }
                    draft.model = event.model || draft.model || '';
                    if (appState.currentSession?.session) {
                        appState.currentSession.session.sessionId = finalSessionId || appState.currentSession.session.sessionId || '';
                        appState.currentSession.session.model = event.model || appState.currentSession.session.model || '';
                    }
                    updateTopBadges();
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'system_notice') {
                    draft.blocks.push({
                        type: 'text',
                        text: `[系统] ${event.message || '会话已自动切换。'}`,
                    });
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'delta') {
                    if (event.channel === 'thinking') {
                        let block = draft.blocks.find((item) => item.type === 'thinking');
                        if (!block) {
                            block = { type: 'thinking', text: '' };
                            draft.blocks.unshift(block);
                        }
                        block.text += event.text || '';
                    } else if (event.channel === 'text') {
                        let block = draft.blocks.find((item) => item.type === 'text');
                        if (!block) {
                            block = { type: 'text', text: '' };
                            draft.blocks.push(block);
                        }
                        block.text += event.text || '';
                    }
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'tool_start') {
                    currentTool = { type: 'tool_use', name: event.name || '工具', input: '' };
                    draft.blocks.push(currentTool);
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'tool_delta') {
                    if (!currentTool) {
                        currentTool = { type: 'tool_use', name: '工具', input: '' };
                        draft.blocks.push(currentTool);
                    }
                    currentTool.input = `${currentTool.input || ''}${event.text || ''}`;
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'tool_snapshot') {
                    draft.blocks.push({ type: 'tool_use', name: event.tool?.name || '工具', input: event.tool?.input || {} });
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'tool_result') {
                    appendToolResultToDraft(draft, event);
                    currentTool = null;
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    return;
                }
                if (event.type === 'done') {
                    appState.isStreaming = false;
                    appState.activeRunId = null;
                    updateStreamingUi();
                    if (event.isError && !draft.blocks.length) {
                        draft.blocks.push({ type: 'text', text: event.result || event.stderr || '请求失败' });
                    }
                    if (event.sessionId) {
                        finalSessionId = event.sessionId;
                    }
                    try {
                        await loadBootstrap({ keepSelection: false, preserveCurrent: true });
                    } catch (error) {
                        console.warn('bootstrap refresh failed', error);
                    }
                    if (finalSessionId) {
                        try {
                            await loadSessionWithRetry(finalSessionId, { silent: true, attempts: 8, waitMs: 250 });
                        } catch (error) {
                            console.warn('delayed session load failed', error);
                            if (appState.currentSession?.session) {
                                appState.currentSession.session.sessionId = finalSessionId;
                            }
                            renderSidebar();
                            scheduleMessagesRender({ stickToBottom: true, force: true });
                        }
                    }
                    updateStreamingUi();
                    return;
                }
                if (event.type === 'stopped') {
                    appState.isStreaming = false;
                    appState.activeRunId = null;
                    draft.blocks.push({ type: 'text', text: '[已停止]' });
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    updateStreamingUi();
                    return;
                }
                if (event.type === 'error') {
                    appState.isStreaming = false;
                    appState.activeRunId = null;
                    draft.blocks.push({ type: 'text', text: event.message || '未知错误' });
                    scheduleMessagesRender({ stickToBottom: true, force: true });
                    updateStreamingUi();
                }
            };

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n');
                buffer = parts.pop() || '';
                for (const part of parts) {
                    const line = part.trim();
                    if (!line) continue;
                    try {
                        const event = JSON.parse(line);
                        await handleEvent(event);
                    } catch (error) {
                        console.error('stream parse error', error, line);
                    }
                }
            }

            if (buffer.trim()) {
                try {
                    await handleEvent(JSON.parse(buffer.trim()));
                } catch (error) {
                    console.error('tail parse error', error, buffer);
                }
            }
            appState.isStreaming = false;
            appState.activeRunId = null;
            updateStreamingUi();
        }

        async function stopCurrentRun() {
            if (!appState.activeRunId) return;
            await apiJson('/claude-console/stop-run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ runId: appState.activeRunId }),
            });
        }

        async function openTerminalSession() {
            const busyRun = findBusyRunForSession(appState.selectedSessionId);
            const forkForSystemSession = shouldForkSessionForManualChat(appState.selectedSessionId);
            const payload = {
                mode: appState.mode,
                agentMode: appState.agentMode,
                sessionId: (busyRun || forkForSystemSession) ? '' : appState.selectedSessionId,
                permissionMode: appState.permissionMode,
            };
            await apiJson('/claude-console/open-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
        }

        function handleError(error) {
            console.error(error);
            appState.isStreaming = false;
            appState.activeRunId = null;
            appState.bootstrapLoading = false;
            updateStreamingUi();
            const message = error instanceof Error ? error.message : String(error);
            if (draftCanBeDiscarded()) {
                discardTransientDraftConversation();
                window.alert(message);
                return;
            }
            if (!appState.currentSession?.session && !selectedMessages().length) {
                window.alert(message);
                return;
            }
            const messages = selectedMessages();
            messages.push({
                id: `error-${Date.now()}`,
                role: 'assistant',
                timestamp: new Date().toISOString(),
                model: '',
                blocks: [{ type: 'text', text: message }],
            });
            renderMessages();
        }

        function wireUi() {
            document.getElementById('nav-new-thread').addEventListener('click', () => {
                newDraftConversation();
            });
            document.getElementById('nav-automations').addEventListener('click', () => {
                discardTransientDraftConversation();
                appState.sidebarView = 'automations';
                renderSidebar();
            });
            document.getElementById('nav-skills').addEventListener('click', () => {
                discardTransientDraftConversation();
                appState.sidebarView = 'skills';
                renderSidebar();
            });
            document.getElementById('btn-refresh').addEventListener('click', () => loadBootstrap().catch(handleError));
            document.getElementById('session-search').addEventListener('input', (event) => {
                appState.search = event.target.value.trim();
                renderSidebar();
            });
            document.getElementById('session-groups').addEventListener('click', (event) => {
                handleSidebarClick(event);
            });
            document.getElementById('session-groups').addEventListener('wheel', () => {
                noteSidebarInteraction();
            }, { passive: true });
            document.getElementById('session-groups').addEventListener('scroll', () => {
                noteSidebarInteraction();
            }, { passive: true });
            document.getElementById('session-groups').addEventListener('pointerdown', () => {
                noteSidebarInteraction();
            });
            document.getElementById('btn-new-folder').addEventListener('click', () => {
                promptCreateFolder();
            });
            document.getElementById('filter-active').addEventListener('click', () => {
                appState.showArchived = false;
                document.getElementById('filter-active').classList.add('active');
                document.getElementById('filter-archived').classList.remove('active');
                loadBootstrap({ keepSelection: false }).catch(handleError);
            });
            document.getElementById('filter-archived').addEventListener('click', () => {
                appState.showArchived = true;
                document.getElementById('filter-active').classList.remove('active');
                document.getElementById('filter-archived').classList.add('active');
                loadBootstrap({ keepSelection: false }).catch(handleError);
            });
            document.getElementById('filter-internal').addEventListener('click', () => {
                appState.showInternal = !appState.showInternal;
                document.getElementById('filter-internal').classList.toggle('active', appState.showInternal);
                renderSidebar();
            });
            document.getElementById('permission-mode').addEventListener('change', (event) => {
                appState.permissionMode = event.target.value;
                updateTopBadges();
            });
            document.getElementById('model-route').addEventListener('change', (event) => {
                appState.mode = event.target.value || 'auto';
                updateTopBadges();
            });
            document.getElementById('agent-mode').addEventListener('change', (event) => {
                appState.agentMode = event.target.value || 'auto';
                updateTopBadges();
            });
            document.getElementById('btn-attach-file').addEventListener('click', (event) => {
                event.preventDefault();
                openAttachmentPicker();
            });
            document.getElementById('file-input').addEventListener('change', (event) => {
                uploadFiles(event.target.files).catch(handleError).finally(() => {
                    event.target.value = '';
                });
            });
            document.getElementById('messages').addEventListener('click', (event) => {
                const loadAllButton = event.target.closest('[data-load-all-messages]');
                if (loadAllButton) {
                    event.preventDefault();
                    showAllCurrentMessages();
                    return;
                }
                const loadMoreButton = event.target.closest('[data-load-more-messages]');
                if (loadMoreButton) {
                    event.preventDefault();
                    expandCurrentMessageWindow(Number(loadMoreButton.dataset.loadMoreMessages || MESSAGE_WINDOW_STEP));
                    return;
                }
                const toggleThinkingButton = event.target.closest('[data-toggle-thinking]');
                if (toggleThinkingButton) {
                    event.preventDefault();
                    const messageId = String(toggleThinkingButton.dataset.toggleThinking || '').trim();
                    if (messageId) {
                        if (appState.thinkingExpanded[messageId]) {
                            delete appState.thinkingExpanded[messageId];
                        } else {
                            appState.thinkingExpanded[messageId] = true;
                        }
                        scheduleMessagesRender({ force: true });
                    }
                    return;
                }
                const expandBlockButton = event.target.closest('[data-expand-block]');
                if (expandBlockButton) {
                    event.preventDefault();
                    const key = String(expandBlockButton.dataset.expandBlock || '').trim();
                    const [messageId = '', kind = '', index = '0'] = key.split('::');
                    setBlockExpanded(messageId, kind, Number(index), true);
                    scheduleMessagesRender({ force: true });
                    return;
                }
                const collapseBlockButton = event.target.closest('[data-collapse-block]');
                if (collapseBlockButton) {
                    event.preventDefault();
                    const key = String(collapseBlockButton.dataset.collapseBlock || '').trim();
                    const [messageId = '', kind = '', index = '0'] = key.split('::');
                    setBlockExpanded(messageId, kind, Number(index), false);
                    scheduleMessagesRender({ force: true });
                    return;
                }
                const copyButton = event.target.closest('[data-copy-message]');
                if (copyButton) {
                    event.preventDefault();
                    event.stopPropagation();
                    copyMessage(copyButton.dataset.copyMessage || '').catch(handleError);
                    return;
                }
                const messageNode = event.target.closest('.message-card[data-message-id]');
                if (!messageNode) return;
                setFocusedMessage(messageNode.dataset.messageId || '');
            });
            document.getElementById('messages').addEventListener('focusin', (event) => {
                const messageNode = event.target.closest('.message-card[data-message-id]');
                if (!messageNode) return;
                setFocusedMessage(messageNode.dataset.messageId || '');
            });
            document.getElementById('btn-send').addEventListener('click', () => {
                sendMessage().catch(handleError);
            });
            document.getElementById('btn-stop-run').addEventListener('click', () => {
                stopCurrentRun().catch(handleError);
            });
            document.getElementById('btn-open-settings').addEventListener('click', () => {
                openSettingsDialog().catch(handleError);
            });
            document.getElementById('btn-open-terminal').addEventListener('click', () => {
                openTerminalSession().catch(handleError);
            });
            document.getElementById('sidebar-dialog-close').addEventListener('click', () => {
                closeSidebarDialog();
            });
            document.getElementById('sidebar-dialog-cancel').addEventListener('click', () => {
                closeSidebarDialog();
            });
            document.getElementById('sidebar-dialog-confirm').addEventListener('click', () => {
                submitSidebarDialog().catch((error) => console.error('dialog submit failed', error));
            });
            document.getElementById('sidebar-dialog').addEventListener('click', (event) => {
                if (event.target.id === 'sidebar-dialog') {
                    closeSidebarDialog();
                }
            });
            document.getElementById('settings-dialog-close').addEventListener('click', () => {
                closeSettingsDialog();
            });
            document.getElementById('settings-dialog-cancel').addEventListener('click', () => {
                closeSettingsDialog();
            });
            document.getElementById('settings-dialog-confirm').addEventListener('click', () => {
                submitSettingsDialog().catch((error) => console.error('settings submit failed', error));
            });
            document.getElementById('settings-dialog').addEventListener('click', (event) => {
                if (event.target.id === 'settings-dialog') {
                    closeSettingsDialog();
                }
            });
            document.getElementById('composer-input').addEventListener('compositionstart', () => {
                appState.composerImeComposing = true;
            });
            document.getElementById('composer-input').addEventListener('compositionend', () => {
                appState.composerImeComposing = false;
            });
            document.getElementById('composer-input').addEventListener('paste', (event) => {
                const clipboard = event.clipboardData;
                if (!clipboard) return;
                const files = Array.from(clipboard.files || []).filter(Boolean);
                if (files.length) {
                    event.preventDefault();
                    uploadFiles(files).catch(handleError);
                    return;
                }
                const text = clipboard.getData('text/plain');
                if (typeof text === 'string' && text.length) {
                    event.preventDefault();
                    insertTextAtCursor(event.currentTarget, text);
                }
            });
            document.getElementById('composer-input').addEventListener('keydown', (event) => {
                if (event.isComposing || appState.composerImeComposing || event.keyCode === 229) {
                    return;
                }
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    sendMessage().catch(handleError);
                }
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && document.getElementById('settings-dialog').classList.contains('is-open')) {
                    event.preventDefault();
                    closeSettingsDialog();
                    return;
                }
                if (event.key === 'Escape' && document.getElementById('sidebar-dialog').classList.contains('is-open')) {
                    event.preventDefault();
                    closeSidebarDialog();
                    return;
                }
                if (
                    event.key === 'Enter'
                    && !event.shiftKey
                    && document.getElementById('sidebar-dialog').classList.contains('is-open')
                ) {
                    const activeTag = String(document.activeElement?.tagName || '').toLowerCase();
                    if (activeTag !== 'textarea') {
                        event.preventDefault();
                        submitSidebarDialog().catch((error) => console.error('dialog enter submit failed', error));
                        return;
                    }
                }
                if (
                    event.key === 'Enter'
                    && !event.shiftKey
                    && document.getElementById('settings-dialog').classList.contains('is-open')
                ) {
                    const activeTag = String(document.activeElement?.tagName || '').toLowerCase();
                    if (activeTag !== 'textarea') {
                        event.preventDefault();
                        submitSettingsDialog().catch((error) => console.error('settings enter submit failed', error));
                        return;
                    }
                }
                const isSelectAll = (event.metaKey || event.ctrlKey) && String(event.key || '').toLowerCase() === 'a';
                if (!isSelectAll) return;
                const activeTag = String(document.activeElement?.tagName || '').toLowerCase();
                if (['input', 'textarea', 'select'].includes(activeTag)) return;
                const targetId = appState.focusedMessageId
                    || [...selectedMessages()].reverse().find((item) => item.role === 'assistant' || item.role === 'tool')?.id
                    || '';
                if (!targetId) return;
                event.preventDefault();
                selectMessageContent(targetId);
            });
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    discardTransientDraftConversation();
                    return;
                }
                backgroundRefreshTick().catch((error) => console.warn('visibility refresh failed', error));
            });

        }

        appState.folderCollapse = restoreFolderCollapseState();
        wireUi();
        startBackgroundRefresh();
        appState.currentSession = { session: null, messages: [] };
        renderModelOptions();
        renderAgentModeOptions();
        renderAttachments();
        restoreBootstrapCache();
        renderSidebar();
        renderMessages();
        loadBootstrap({ keepSelection: false }).catch(handleError);
    </script>
</body>
</html>
