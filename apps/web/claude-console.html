<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 工作台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23d67f5c'/%3E%3Cpath d='M32 12l4.2 11.8L48 28l-11.8 4.2L32 44l-4.2-11.8L16 28l11.8-4.2L32 12z' fill='%23fff7f2'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #f4f0e7;
            --bg-soft: #ece6dc;
            --panel: rgba(249, 247, 242, 0.94);
            --panel-strong: rgba(255, 253, 249, 0.98);
            --line: rgba(112, 103, 92, 0.14);
            --line-strong: rgba(112, 103, 92, 0.22);
            --text: #312d28;
            --muted: #7c7368;
            --accent: #d67f5c;
            --accent-strong: #bc6644;
            --accent-soft: rgba(214, 127, 92, 0.16);
            --mint: #607f73;
            --user: #e8d4c7;
            --assistant: #fbfaf7;
            --tool: #f0eee7;
            --shadow: 0 14px 40px rgba(71, 57, 42, 0.08);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
            --font-mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            min-height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(214, 127, 92, 0.09), transparent 28%),
                linear-gradient(180deg, #f7f3ed 0%, #f4f0e7 48%, #efeadf 100%);
            color: var(--text);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            padding: 18px;
            overflow: hidden;
            user-select: none;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 392px minmax(0, 1fr);
            gap: 18px;
            height: calc(100vh - 36px);
            min-height: calc(100vh - 36px);
            max-width: 1500px;
            margin: 0 auto;
        }

        .sidebar,
        .workspace {
            min-height: 0;
            border-radius: 30px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar {
            background: rgba(245, 240, 232, 0.9);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .workspace {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            background: rgba(247, 244, 238, 0.92);
            backdrop-filter: blur(10px);
        }

        .sidebar-top,
        .workspace-top {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--line);
        }

        .brand-row,
        .workspace-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .brand-mark,
        .session-status-pill,
        .mode-chip,
        .mini-badge,
        .group-label,
        .action-pill,
        .assistant-meta,
        .tool-label,
        .tiny-label {
            font-family: var(--font-mono);
            letter-spacing: 0.04em;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--accent-strong);
        }

        .brand-mark strong {
            color: var(--text);
            font-size: 15px;
        }

        .brand-sub {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .brand-sub:empty {
            display: none;
        }

        .sidebar-nav {
            display: grid;
            gap: 8px;
            margin-top: 18px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid transparent;
            background: rgba(255, 252, 247, 0.62);
            color: var(--text);
            text-align: left;
        }

        .nav-item.active {
            background: rgba(214, 127, 92, 0.12);
            border-color: rgba(188, 102, 68, 0.18);
            color: var(--accent-strong);
        }

        .nav-icon {
            font-family: var(--font-mono);
            color: var(--accent-strong);
            font-size: 14px;
            min-width: 20px;
        }

        .sidebar-actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-top: 18px;
        }

        button,
        select,
        textarea,
        input {
            font: inherit;
        }

        textarea,
        input,
        select,
        .message-copy-scope,
        .message-content,
        .thinking-body,
        .tool-json {
            user-select: text;
        }

        button {
            appearance: none;
            border: 0;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, opacity 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .primary-btn,
        .ghost-btn,
        .soft-btn,
        .icon-btn,
        .chip-btn,
        .session-action-btn {
            border-radius: 15px;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent), #e5a286);
            color: #fff8f4;
            padding: 12px 16px;
            box-shadow: 0 10px 22px rgba(188, 102, 68, 0.16);
        }

        .ghost-btn,
        .soft-btn,
        .chip-btn,
        .session-action-btn,
        .icon-btn {
            border: 1px solid var(--line);
            background: rgba(255, 252, 247, 0.82);
            color: var(--text);
        }

        .ghost-btn {
            padding: 12px 14px;
        }

        .soft-btn {
            padding: 10px 12px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .search-wrap {
            margin-top: 14px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.84);
            color: var(--text);
        }

        .search-wrap::before {
            content: "⌕";
            position: absolute;
            left: 15px;
            top: 11px;
            color: var(--muted);
            font-size: 18px;
        }

        .sidebar-filters {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .thread-filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
        }

        .sidebar-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 18px;
        }

        .sidebar-inline-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chip-btn {
            padding: 8px 12px;
            font-size: 12px;
        }

        .chip-btn.active {
            background: var(--accent-soft);
            border-color: rgba(188, 102, 68, 0.26);
            color: var(--accent-strong);
        }

        .sidebar-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 14px 18px;
            overscroll-behavior: contain;
            contain: paint style;
            will-change: scroll-position;
        }

        .group-block + .group-block {
            margin-top: 18px;
        }

        .group-block {
            contain: paint style;
        }

        .group-label {
            font-size: 12px;
            color: var(--muted);
            margin: 0 0 10px;
            padding: 0 8px;
        }

        .session-list {
            display: grid;
            gap: 8px;
        }

        .session-item {
            padding: 12px 12px 10px;
            border-radius: 18px;
            border: 1px solid transparent;
            background: rgba(255, 252, 247, 0.78);
            cursor: pointer;
            transition: background-color 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
            contain: paint style;
        }

        .session-item.active {
            background: rgba(255, 248, 242, 0.98);
            border-color: rgba(188, 102, 68, 0.22);
            box-shadow: inset 0 0 0 1px rgba(188, 102, 68, 0.08);
        }

        .session-item.pending {
            border-style: dashed;
            border-color: rgba(188, 102, 68, 0.2);
            background: rgba(255, 251, 246, 0.92);
        }

        .session-item-top,
        .composer-top,
        .composer-bottom,
        .welcome-actions,
        .message-head,
        .tool-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .session-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-row-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .session-time,
        .workspace-subtitle,
        .composer-note,
        .message-time,
        .tool-body,
        .empty-note,
        .welcome-note,
        .status-note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .session-meta-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .session-topic-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 9px;
            border-radius: 999px;
            font-size: 11px;
            border: 1px solid rgba(188, 102, 68, 0.16);
            background: rgba(214, 127, 92, 0.08);
            color: var(--accent-strong);
            font-family: var(--font-mono);
        }

        .session-action-row,
        .message-action-row {
            display: flex;
            gap: 6px;
        }

        .session-action-btn {
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .session-item .session-action-row,
        .session-item:hover .session-action-row,
        .session-item.active .session-action-row,
        .session-item.loading .session-action-row {
            opacity: 1;
        }

        .session-item-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 146px;
            align-items: center;
            gap: 10px;
            min-width: 0;
            position: relative;
        }

        .session-row-title {
            min-width: 0;
            padding-right: 0;
            display: block;
        }

        .session-action-row {
            flex-shrink: 0;
            width: 146px;
            min-width: 146px;
            justify-content: flex-end;
            justify-self: end;
            position: relative;
            z-index: 2;
        }

        .session-action-btn[disabled] {
            cursor: wait;
            opacity: 0.72;
            transform: none;
        }

        .session-action-btn.is-busy {
            border-color: rgba(188, 102, 68, 0.22);
            color: var(--accent-strong);
        }

        .folder-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 2px 8px 10px;
        }

        .folder-toggle-btn {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            background: transparent;
            color: var(--muted);
            text-align: left;
            border-radius: 12px;
        }

        .folder-toggle-btn:hover {
            background: rgba(255, 252, 247, 0.68);
        }

        .folder-chevron {
            width: 12px;
            text-align: center;
            color: var(--accent-strong);
            font-family: var(--font-mono);
        }

        .folder-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-edit-btn,
        .folder-create-btn {
            width: 30px;
            height: 30px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .session-list.is-collapsed {
            display: none;
        }

        .session-item.loading {
            border-color: rgba(188, 102, 68, 0.22);
            box-shadow: inset 0 0 0 1px rgba(188, 102, 68, 0.1);
        }

        .overlay-backdrop {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(40, 31, 22, 0.26);
            backdrop-filter: blur(10px);
            z-index: 30;
        }

        .overlay-backdrop.is-open {
            display: flex;
        }

        .overlay-panel {
            width: min(460px, 100%);
            padding: 22px;
            border-radius: 24px;
            border: 1px solid var(--line-strong);
            background: rgba(255, 253, 249, 0.98);
            box-shadow: 0 22px 48px rgba(40, 31, 22, 0.14);
        }

        .overlay-head,
        .overlay-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .overlay-head h3 {
            margin: 0;
            font-size: 20px;
            letter-spacing: -0.03em;
        }

        .overlay-body {
            display: grid;
            gap: 14px;
            margin-top: 16px;
        }

        .overlay-field {
            display: grid;
            gap: 8px;
        }

        .overlay-field span {
            color: var(--muted);
            font-size: 12px;
            font-family: var(--font-mono);
            letter-spacing: 0.04em;
        }

        .overlay-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 252, 247, 0.88);
            color: var(--text);
        }

        .overlay-input:focus {
            outline: none;
            border-color: rgba(188, 102, 68, 0.28);
            box-shadow: 0 0 0 3px rgba(214, 127, 92, 0.08);
        }

        .overlay-note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
        }

        .overlay-note.error {
            color: #a0482a;
        }

        .overlay-actions {
            margin-top: 18px;
            justify-content: flex-end;
        }

        .overlay-danger {
            background: linear-gradient(135deg, #b85f42, #d67f5c);
        }

        .workspace-top {
            display: grid;
            gap: 12px;
            background: rgba(252, 250, 246, 0.86);
        }

        .workspace-title {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .workspace-title h1 {
            margin: 0;
            font-family: var(--font-sans);
            font-size: clamp(28px, 3vw, 42px);
            font-weight: 650;
            line-height: 1.04;
            letter-spacing: -0.04em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .workspace-status {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .session-status-pill,
        .mini-badge,
        .mode-chip,
        .action-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 11px;
        }

        .session-status-pill,
        .mini-badge {
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.88);
        }

        .session-status-pill.ok {
            background: rgba(96, 127, 115, 0.12);
            color: var(--mint);
            border-color: rgba(96, 127, 115, 0.2);
        }

        .session-status-pill.fail {
            background: rgba(214, 127, 92, 0.12);
            color: var(--accent-strong);
            border-color: rgba(188, 102, 68, 0.24);
        }

        .action-pill {
            background: rgba(214, 127, 92, 0.1);
            color: var(--accent-strong);
            border: 1px solid rgba(188, 102, 68, 0.18);
        }

        .workspace-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .workspace-body {
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            padding: 22px 24px 12px;
        }

        .messages {
            display: grid;
            gap: 18px;
            align-content: start;
            padding-bottom: 12px;
            contain: layout paint style;
            will-change: scroll-position;
        }

        .message-row {
            display: flex;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.assistant,
        .message-row.tool {
            justify-content: flex-start;
        }

        .message-card {
            max-width: min(860px, 100%);
            padding: 16px 18px;
            border-radius: 22px;
            border: 1px solid var(--line);
            box-shadow: 0 8px 22px rgba(71, 57, 42, 0.05);
            position: relative;
            contain: layout paint style;
        }

        .message-card.is-focused {
            border-color: rgba(188, 102, 68, 0.24);
            box-shadow: 0 10px 26px rgba(188, 102, 68, 0.08);
        }

        .message-row.user .message-card {
            background: var(--user);
            border-top-right-radius: 8px;
        }

        .message-row.assistant .message-card {
            background: var(--assistant);
            border-top-left-radius: 8px;
        }

        .message-row.tool .message-card {
            background: var(--tool);
            border-top-left-radius: 8px;
        }

        .assistant-meta {
            font-size: 11px;
            color: var(--accent-strong);
        }

        .message-content {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.75;
            font-size: 15px;
        }

        .message-copy-scope {
            margin-top: 10px;
        }

        .message-window-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid rgba(188, 102, 68, 0.14);
            background: rgba(255, 248, 241, 0.84);
        }

        .message-window-meta {
            color: var(--muted);
            font-size: 13px;
        }

        .message-window-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .message-icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: rgba(255, 252, 247, 0.92);
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .message-icon-btn:hover,
        .session-action-btn:hover {
            color: var(--accent-strong);
            border-color: rgba(188, 102, 68, 0.24);
        }

        .thinking-wrap {
            margin-bottom: 12px;
            border: 1px dashed rgba(112, 103, 92, 0.24);
            border-radius: 16px;
            background: rgba(244, 240, 231, 0.8);
            overflow: hidden;
        }

        .thinking-toggle-btn {
            width: 100%;
            border: 0;
            background: transparent;
            padding: 10px 12px;
            cursor: pointer;
            color: var(--muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            text-align: left;
        }

        .thinking-body {
            padding: 0 12px 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .tool-stack {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .block-fade-mask {
            height: 28px;
            margin-top: -28px;
            background: linear-gradient(180deg, rgba(255, 253, 249, 0), rgba(255, 253, 249, 0.96));
            pointer-events: none;
            border-radius: 0 0 10px 10px;
        }

        .block-toggle-row {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .message-inline-btn {
            border-radius: 999px;
            border: 1px solid rgba(188, 102, 68, 0.18);
            background: rgba(255, 252, 247, 0.92);
            color: var(--accent-strong);
            padding: 6px 12px;
            font-size: 12px;
            line-height: 1;
        }

        .block-meta {
            color: var(--muted);
            font-size: 12px;
            font-family: var(--font-mono);
        }

        .tool-card {
            padding: 12px;
            border-radius: 16px;
            background: rgba(240, 238, 231, 0.86);
            border: 1px solid rgba(112, 103, 92, 0.16);
        }

        .tool-label {
            font-size: 11px;
            color: var(--accent-strong);
        }

        .tool-json {
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-word;
            font: 12px/1.6 "SF Mono", "JetBrains Mono", monospace;
            color: #564d45;
            background: rgba(255,255,255,0.52);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(112, 103, 92, 0.12);
        }

        .welcome-state {
            min-height: 100%;
            display: grid;
            place-items: center;
            padding: 30px 18px 42px;
        }

        .welcome-card {
            width: min(760px, 100%);
            text-align: center;
            padding: 48px 36px;
            border-radius: 32px;
            border: 1px solid var(--line);
            background: rgba(255, 253, 249, 0.88);
            box-shadow: var(--shadow);
        }

        .welcome-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(214, 127, 92, 0.1);
            color: var(--accent-strong);
            font-size: 12px;
            font-family: var(--font-mono);
        }

        .welcome-title {
            margin: 18px 0 12px;
            font-family: var(--font-sans);
            font-size: clamp(34px, 4.4vw, 56px);
            line-height: 1.02;
            letter-spacing: -0.04em;
            font-weight: 680;
        }

        .welcome-note {
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome-actions {
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .composer {
            position: sticky;
            bottom: 0;
            z-index: 5;
            padding: 18px 24px 24px;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(250, 248, 243, 0.72), rgba(245, 240, 232, 0.98));
            backdrop-filter: blur(16px);
        }

        .composer-card {
            border-radius: 28px;
            border: 1px solid var(--line-strong);
            background: rgba(255, 253, 249, 0.96);
            padding: 14px;
            box-shadow: 0 10px 28px rgba(71, 57, 42, 0.06);
        }

        .composer-top {
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .composer-toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .composer-select {
            border: 1px solid var(--line);
            background: rgba(255, 252, 247, 0.92);
            border-radius: 14px;
            padding: 9px 12px;
            color: var(--text);
        }

        .attach-btn {
            padding: 9px 12px;
        }

        .native-file-input {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0.001;
            pointer-events: none;
        }

        .attachment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 6px 8px;
        }

        .attachment-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(240, 238, 231, 0.72);
            font-size: 12px;
            color: var(--muted);
        }

        .attachment-chip button {
            background: transparent;
            color: var(--accent-strong);
            padding: 0;
            border: 0;
        }

        .composer textarea {
            width: 100%;
            min-height: 118px;
            border: 0;
            resize: vertical;
            background: transparent;
            color: var(--text);
            padding: 10px 6px;
            line-height: 1.7;
            font-size: 16px;
        }

        .composer textarea:focus,
        .search-wrap input:focus,
        .composer-select:focus {
            outline: none;
        }

        .composer-bottom {
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .composer-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .library-list {
            display: grid;
            gap: 10px;
        }

        .library-card {
            padding: 12px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 252, 247, 0.82);
        }

        .library-card.compact-row {
            padding: 10px 12px;
        }

        .library-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .library-card.compact-row .library-card-top {
            align-items: center;
        }

        .library-meta {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .settings-panel {
            width: min(720px, calc(100vw - 28px));
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .settings-grid .overlay-field {
            margin: 0;
        }

        .settings-grid .overlay-field.span-2 {
            grid-column: 1 / -1;
        }

        .settings-help {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
        }

        .empty-panel {
            padding: 20px;
            text-align: center;
            color: var(--muted);
        }

        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @media (max-width: 1180px) {
            .app-shell {
                grid-template-columns: 320px minmax(0, 1fr);
            }
        }

        @media (max-width: 980px) {
            body {
                padding: 10px;
            }
            .app-shell {
                grid-template-columns: 1fr;
                min-height: auto;
            }
            .sidebar {

            }

            }
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .settings-grid .overlay-field.span-2 {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>

    <script>
        const EMPTY_LIBRARY = { automations: [], skills: [], agents: [], mcps: [], counts: { automations: 0, skills: 0, agents: 0, mcps: 0 } };
        const BOOTSTRAP_CACHE_KEY = 'claude-console-bootstrap-cache-v3';
        const FOLDER_COLLAPSE_KEY = 'claude-console-folder-collapse-v1';
        const BACKGROUND_REFRESH_MS = 800;
        const FULL_BOOTSTRAP_REFRESH_MS = 30000;
        const SIDEBAR_INTERACTION_HOLD_MS = 1400;
        const MESSAGE_WINDOW_DEFAULT = 120;
        const MESSAGE_WINDOW_STEP = 120;
        const LARGE_TEXT_PREVIEW_LIMIT = 2200;
        const LARGE_TOOL_PREVIEW_LIMIT = 1800;
        const LARGE_THINKING_PREVIEW_LIMIT = 1200;
        const appState = {
            sessions: [],
            selectedSessionId: null,
            currentSession: null,
            search: '',
            showArchived: false,
            showInternal: false,
            sidebarView: 'threads',
            mode: 'auto',
            availableModes: [],
            agentMode: 'auto',
            availableAgentModes: [],
            permissionMode: 'bypassPermissions',
            activeRunId: null,
            isStreaming: false,
            bootstrap: null,
            bootstrapLoading: true,
            bootstrapLoaded: false,
            bootstrapCacheUsed: false,
            library: { ...EMPTY_LIBRARY },
            folderRegistry: [],
            attachments: [],
            composerImeComposing: false,
            focusedMessageId: null,
            backgroundRefreshRunning: false,
            backgroundRefreshTimer: null,
            sessionDetailCache: {},
            bootstrapSignature: '',
            pollSignature: '',
            sessionLoadToken: 0,
            sessionLoadingId: null,
            sessionActionPending: {},
            folderCollapse: {},
            dialogBusy: false,
            thinkingExpanded: {},
            expandedBlocks: {},
            messageRenderQueued: false,
            pendingMessageScroll: false,
            forceMessageScroll: false,
            lastRenderMessageFingerprint: '',
            lastOpenclawDispatchSignature: '',
            lastFullBootstrapAt: 0,
            sidebarRenderSignature: '',
            sidebarInteractionUntil: 0,
            sidebarFreezeUntil: 0,
            sidebarRenderPending: false,
            deferredSidebarTimer: null,
            messageWindowBySession: {},
            sessionLoadController: null,
            settingsBusy: false,
        };

        let dialogConfirmHandler = null;

        function escapeHtml(text) {
            return String(text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function formatTime(isoText) {
            if (!isoText) return '';
            const date = new Date(isoText);
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDateGroup(isoText) {
            const date = new Date(isoText || Date.now());
            if (Number.isNaN(date.getTime())) return '更早';
            const today = new Date();
            const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const yesterdayStart = new Date(todayStart);
            yesterdayStart.setDate(todayStart.getDate() - 1);
            if (date >= todayStart) return '今天';
            if (date >= yesterdayStart) return '昨天';
            return '更早';
        }

        function summarizeSessionId(sessionId) {
            return String(sessionId || '').trim().slice(0, 8);
        }

        function formatPermissionLabel(mode) {
            if (mode === 'bypassPermissions') return '全权限';
            if (mode === 'acceptEdits') return '自动接收改动';
            return '默认确认模式';
        }

        function formatBytes(size) {
            const value = Number(size || 0);
            if (!Number.isFinite(value) || value <= 0) return '';
            if (value < 1024) return `${value} B`;
            if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
            return `${(value / (1024 * 1024)).toFixed(1)} MB`;
        }

        function formatCompactCount(value) {
            const numeric = Number(value || 0);
            if (!Number.isFinite(numeric) || numeric <= 0) return '0';
            if (numeric >= 1000000) return `${(numeric / 1000000).toFixed(1).replace(/\\.0$/, '')}M`;
            if (numeric >= 1000) return `${(numeric / 1000).toFixed(1).replace(/\\.0$/, '')}k`;
            return String(Math.round(numeric));
        }

        function selectedModeInfo() {
            return appState.availableModes.find((item) => item.id === appState.mode) || appState.availableModes[0] || null;
        }

        function selectedAgentModeInfo() {
            return appState.availableAgentModes.find((item) => item.id === appState.agentMode) || appState.availableAgentModes[0] || null;
        }

        function setSidebarCountLabel(text) {
            const node = document.getElementById('session-count-label');
            if (!node) return;
            node.textContent = text;
        }

        function cloneEmptyLibrary() {
            return {
                automations: [],
                skills: [],
                agents: [],
                mcps: [],
                counts: { automations: 0, skills: 0, agents: 0, mcps: 0 },
            };
        }

        function deepClone(value) {
            if (value === null || value === undefined) return value;
            return JSON.parse(JSON.stringify(value));
        }

        function buildBootstrapSignature(payload) {
            const sessions = Array.isArray(payload?.sessions) ? payload.sessions : [];
            const sessionSignature = sessions.map((item) => [
                item?.sessionId || '',
                item?.updatedAt || '',
                item?.title || '',
                item?.folder || '',
                item?.pinned ? '1' : '0',
                item?.archived ? '1' : '0',
                item?.fixed ? '1' : '0',
            ].join('~')).join('|');
            const libraryCounts = JSON.stringify(payload?.library?.counts || {});
            const folderSignature = JSON.stringify(payload?.folders || []);
            const modeSignature = JSON.stringify(payload?.modes || []);
            const agentModeSignature = JSON.stringify(payload?.agentModes || []);
            const healthSignature = JSON.stringify(payload?.health || {});
            const dispatch = payload?.openclawDispatch || {};
            const dispatchSignature = JSON.stringify({
                queueLength: dispatch?.queueLength || 0,
                active: dispatch?.active?.dispatchId || '',
                activeStartedAt: dispatch?.active?.startedAt || '',
                historyTail: Array.isArray(dispatch?.history)
                    ? dispatch.history.slice(-3).map((item) => [item?.dispatchId || '', item?.finishedAt || '', item?.ok ? '1' : '0'].join('~'))
                    : [],
            });
            return [sessionSignature, libraryCounts, folderSignature, dispatchSignature, modeSignature, agentModeSignature, healthSignature].join('##');
        }

        function restoreFolderCollapseState() {
            try {
                const raw = window.localStorage.getItem(FOLDER_COLLAPSE_KEY);
                if (!raw) return {};
                const payload = JSON.parse(raw);
                return payload && typeof payload === 'object' ? payload : {};
            } catch (error) {
                console.warn('folder collapse restore failed', error);
                return {};
            }
        }

        function saveFolderCollapseState() {
            try {
                window.localStorage.setItem(FOLDER_COLLAPSE_KEY, JSON.stringify(appState.folderCollapse || {}));
            } catch (error) {
                console.warn('folder collapse save failed', error);
            }
        }

        function saveBootstrapCache(payload) {
            try {
                window.localStorage.setItem(BOOTSTRAP_CACHE_KEY, JSON.stringify(payload));
            } catch (error) {
                console.warn('bootstrap cache save failed', error);
            }
        }

        function restoreBootstrapCache() {
            try {
                const raw = window.localStorage.getItem(BOOTSTRAP_CACHE_KEY);
                if (!raw) return false;
                const payload = JSON.parse(raw);
                if (!payload || typeof payload !== 'object') return false;
                applyBootstrapPayload(payload, { fromCache: true });
                appState.bootstrapLoading = true;
                appState.bootstrapCacheUsed = true;
                renderSidebar();
                renderAttachments();
                updateTopBadges();
                return true;
            } catch (error) {
                console.warn('bootstrap cache restore failed', error);
                return false;
            }
        }

        function applyBootstrapPayload(payload, { fromCache = false } = {}) {
            const nextSignature = buildBootstrapSignature(payload);
            const changed = nextSignature !== appState.bootstrapSignature;
            appState.bootstrapSignature = nextSignature;
            appState.bootstrap = payload;
            appState.sessions = (payload.sessions || []).map((item) => normalizeSessionSummary(item));
            appState.library = payload.library || cloneEmptyLibrary();
            appState.folderRegistry = Array.isArray(payload.folders) ? payload.folders.map((item) => normalizeFolderName(item)).filter(Boolean) : [];
            appState.availableModes = payload.modes || appState.availableModes;
            appState.availableAgentModes = payload.agentModes || appState.availableAgentModes;
            appState.permissionMode = payload.webDefaults?.permissionMode || 'bypassPermissions';
            appState.bootstrapLoaded = !fromCache;
            appState.bootstrapCacheUsed = fromCache;
            const selectedSummary = appState.selectedSessionId
                ? appState.sessions.find((item) => item.sessionId === appState.selectedSessionId)
                : null;
            if (selectedSummary && appState.currentSession?.session) {
                appState.currentSession.session = {
                    ...appState.currentSession.session,
                    ...selectedSummary,
                };
                const cached = appState.sessionDetailCache[selectedSummary.sessionId];
                if (cached) {
                    cached.session = {
                        ...cached.session,
                        ...selectedSummary,
                    };
                }
            }
            return changed;
        }

        function buildPollSignature(payload) {
            const sessions = Array.isArray(payload?.sessions) ? payload.sessions : [];
            const dispatch = payload?.openclawDispatch || {};
            const activeRuns = Array.isArray(payload?.activeRuns) ? payload.activeRuns : [];
            const tmux = payload?.tmux || {};
            return JSON.stringify({
                sessions: sessions.map((item) => [
                    item?.sessionId || '',
                    item?.updatedAt || '',
                    item?.title || '',
                    item?.folder || '',
                    item?.pinned ? '1' : '0',
                    item?.archived ? '1' : '0',
                    item?.fixed ? '1' : '0',
                ].join('~')),
                dispatch: {
                    queueLength: dispatch?.queueLength || 0,
                    active: dispatch?.active?.dispatchId || '',
                    activeStartedAt: dispatch?.active?.startedAt || '',
                    historyTail: Array.isArray(dispatch?.history)
                        ? dispatch.history.slice(-3).map((item) => [item?.dispatchId || '', item?.finishedAt || '', item?.ok ? '1' : '0'].join('~'))
                        : [],
                },
                activeRuns: activeRuns.map((item) => [item?.runId || '', item?.sessionId || '', item?.startedAt || ''].join('~')),
                tmux: {
                    sessionCount: tmux?.sessionCount || 0,
                    sessions: Array.isArray(tmux?.sessions) ? tmux.sessions.map((item) => [item?.name || '', item?.windows || 0, item?.attached || 0].join('~')) : [],
                },
            });
        }

        function applyPollPayload(payload) {
            const nextPayload = {
                ...(appState.bootstrap || {}),
                generatedAt: payload?.generatedAt || new Date().toISOString(),
                sessions: Array.isArray(payload?.sessions) ? payload.sessions : [],
                sessionCount: Number(payload?.sessionCount || 0),
                openclawDispatch: payload?.openclawDispatch || {},
                activeRuns: Array.isArray(payload?.activeRuns) ? payload.activeRuns : [],
                sessionStore: payload?.sessionStore || (appState.bootstrap?.sessionStore || {}),
                tmux: payload?.tmux || (appState.bootstrap?.tmux || {}),
            };
            const nextSignature = buildPollSignature(nextPayload);
            const changed = nextSignature !== appState.pollSignature;
            appState.pollSignature = nextSignature;
            if (!changed) {
                return false;
            }
            applyBootstrapPayload(nextPayload);
            return true;
        }

        function findBusyRunForSession(sessionId) {
            const safeSessionId = String(sessionId || '').trim();
            if (!safeSessionId) return null;
            const activeRuns = Array.isArray(appState.bootstrap?.activeRuns) ? appState.bootstrap.activeRuns : [];
            return activeRuns.find((item) => String(item?.sessionId || '').trim() === safeSessionId) || null;
        }

        function shouldForkSessionForManualChat(sessionId) {
            const safeSessionId = String(sessionId || '').trim();
            if (!safeSessionId) return false;
            const sessionSummary = appState.currentSession?.session?.sessionId === safeSessionId
                ? appState.currentSession.session
                : (appState.sessions || []).find((item) => String(item?.sessionId || '').trim() === safeSessionId);
            if (!sessionSummary) return false;
            const specialRole = String(sessionSummary.specialRole || '').trim().toLowerCase();
            const folder = String(sessionSummary.folder || '').trim();
            return specialRole === 'openclaw-task' || /openclaw/i.test(folder);
        }

        function deriveLocalTopic(text) {
            const value = String(text || '').trim();
            if (!value) return '通用对话';
            if (/(桌面|desktop).{0,12}(截图|截屏|照片|图片|png|jpg|jpeg|webp|heic)/i.test(value)) return '桌面文件';
            if (/(删除|清理|移除).{0,12}(截图|截屏|照片|图片|文件)/i.test(value)) return '桌面文件';
            if (/(截图|截屏|图像|图片|视觉|vision|ui|界面|ocr|figma)/i.test(value)) return '视觉界面';
            if (/(修复|排查|解决|debug|bug|报错|错误|异常|fix)/i.test(value)) return '故障修复';
            if (/(审查|核验|review|audit|diff|变更|回归|检查)/i.test(value)) return '代码核验';
            if (/(部署|发布|上线|deploy|release|gateway|launchagent)/i.test(value)) return '部署运维';
            if (/(自动化|workflow|cron|脚本|agent|守护|路由)/i.test(value)) return '自动化流程';
            if (/(文档|总结|汇总|写作|report|summary|paper|ppt|slide)/i.test(value)) return '文档整理';
            return '通用对话';
        }

        function deriveLocalTitle(text) {
            let seed = String(text || '')
                .replace(/\[route:[^\]]+\]/ig, ' ')
                .replace(/[“”"'`‘’]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            if (!seed) return '新对话';
            seed = seed.split(/[。！？!?；;\n\r]/)[0].trim();
            seed = seed.replace(/^(请你|请先|请|帮我|麻烦你|麻烦|可以|能不能|现在|立刻|直接|继续|先|我想让你|我需要你|需要你|替我|给我|帮忙|你帮我)\s*/i, '').trim();
            if (/(删除|清理|移除).{0,12}(桌面|desktop).{0,12}(截图|截屏|照片|图片)/i.test(seed)) return '删除桌面截屏照片';
            if (/(修复|排查|解决).{0,20}(报错|错误|问题|bug)/i.test(seed)) return '修复关键报错';
            if (/(审查|核验|review|audit).{0,20}(代码|diff|变更)/i.test(seed)) return '代码变更核验';
            if (/(部署|发布|上线|deploy|release)/i.test(seed)) return '部署发布流程';
            if (/(截图|截屏|图像|视觉|vision|界面|ui|ocr)/i.test(seed)) return '界面截图分析';
            if (/^(create|new).{0,12}(file|文件)/i.test(seed)) return '文件创建请求';
            if (/^(update|edit|modify).{0,12}(\/|file|文件)/i.test(seed)) return '文件更新请求';
            if (/[\u4e00-\u9fff]/.test(seed)) {
                return seed.replace(/\s+/g, '').slice(0, 16) || '新对话';
            }
            return seed.split(/\s+/).slice(0, 4).join(' ') || '新对话';
        }

        function titleDisplayWeight(input) {
            return Array.from(String(input || '')).reduce((total, char) => {
                return total + (/[\u1100-\u11ff\u2e80-\u9fff\uf900-\ufaff\uff00-\uffef]/.test(char) ? 2 : 1);
            }, 0);
        }

        function truncateSidebarTitle(title, weightLimit = 16) {
            const chars = Array.from(String(title || '').trim());
            if (!chars.length) return '新对话';
            let weight = 0;
            let index = 0;
            while (index < chars.length) {
                const charWeight = titleDisplayWeight(chars[index]);
                if (weight + charWeight > weightLimit) break;
                weight += charWeight;
                index += 1;
            }
            if (index >= chars.length) return chars.join('');
            return `${chars.slice(0, Math.max(index, 1)).join('')}...`;
        }

        function shouldBeautifyTitle(title) {
            const value = String(title || '').trim();
            if (!value) return true;
            if (/^\[route:/i.test(value)) return true;
            if (/^(fix|review|create|update|reply|say|what'?s)\b/i.test(value)) return true;
            if (!/[\u4e00-\u9fff]/.test(value) && value.length > 22) return true;
            return false;
        }

        function displaySessionTitle(sessionLike) {
            const rawTitle = String(sessionLike?.title || '').trim();
            if (rawTitle && !shouldBeautifyTitle(rawTitle)) return rawTitle;
            return deriveLocalTitle(rawTitle || sessionLike?.preview || '');
        }

        function queueDeferredSidebarRender() {
            if (appState.deferredSidebarTimer) {
                window.clearTimeout(appState.deferredSidebarTimer);
            }
            const holdUntil = Math.max(
                Number(appState.sidebarInteractionUntil || 0),
                Number(appState.sidebarFreezeUntil || 0),
            );
            const delayMs = Math.max(60, holdUntil - Date.now() + 60);
            appState.deferredSidebarTimer = window.setTimeout(() => {
                appState.deferredSidebarTimer = null;
                if (appState.sidebarRenderPending) {
                    appState.sidebarRenderPending = false;
                    renderSidebar({ force: true });
                }
            }, delayMs);
        }

        function noteSidebarInteraction(durationMs = SIDEBAR_INTERACTION_HOLD_MS) {
            appState.sidebarInteractionUntil = Math.max(
                Number(appState.sidebarInteractionUntil || 0),
                Date.now() + Math.max(240, Number(durationMs) || SIDEBAR_INTERACTION_HOLD_MS),
            );
            queueDeferredSidebarRender();
        }

        function freezeSidebarFor(durationMs = SIDEBAR_INTERACTION_HOLD_MS) {
            appState.sidebarFreezeUntil = Math.max(
                Number(appState.sidebarFreezeUntil || 0),
                Date.now() + Math.max(SIDEBAR_INTERACTION_HOLD_MS, Number(durationMs) || SIDEBAR_INTERACTION_HOLD_MS),
            );
            noteSidebarInteraction(durationMs);
        }

        function isSidebarDialogOpen() {
            return document.getElementById('sidebar-dialog')?.classList.contains('is-open');
        }

        function shouldDeferSidebarRender() {
            const holdUntil = Math.max(
                Number(appState.sidebarInteractionUntil || 0),
                Number(appState.sidebarFreezeUntil || 0),
            );
            return isSidebarDialogOpen()
                || appState.dialogBusy
                || Object.keys(appState.sessionActionPending || {}).length > 0
                || Date.now() < holdUntil;
        }

        function normalizeFolderName(name) {
            return String(name || '').trim().replace(/\s+/g, ' ').slice(0, 32);
        }

        function deriveLocalFolder(sessionLike) {
            const explicit = normalizeFolderName(sessionLike?.folder || '');
            if (explicit) return explicit;
            const title = String(sessionLike?.title || '');
            const preview = String(sessionLike?.preview || '');
            const topic = String(sessionLike?.topic || '').trim();
            const specialRole = String(sessionLike?.specialRole || '').trim();
            const probes = `${title}\n${preview}\n${specialRole}`;
            if (/gateway|cron|launchagent|workflow|scheduler|feishu/i.test(probes)) return 'Operations';
            if (/claude\s*code|claude\s*console/i.test(probes)) return 'Claude Code';
            if (topic && topic !== '通用对话') return topic;
            const token = String(displaySessionTitle(sessionLike) || '').trim().split(/[\s/]+/)[0] || '';
            if (/^[a-z0-9._-]{1,18}$/i.test(token)) return token;
            return '未归类';
        }

        function normalizeSessionSummary(sessionLike) {
            const normalized = { ...(sessionLike || {}) };
            normalized.folder = deriveLocalFolder(normalized);
            return normalized;
        }

        function extractPreviewText(messages) {
            const items = Array.isArray(messages) ? [...messages].reverse() : [];
            for (const message of items) {
                const blocks = Array.isArray(message?.blocks) ? message.blocks : [];
                for (const block of blocks) {
                    if (!block) continue;
                    if (block.type === 'text' && block.text) return String(block.text).trim();
                    if (block.type === 'tool_result' && block.text) return String(block.text).trim();
                }
            }
            return '';
        }

        function buildCurrentSessionCard() {
            const summary = appState.currentSession?.session;
            if (!summary) return null;
            const messages = selectedMessages();
            const preview = extractPreviewText(messages);
            const title = displaySessionTitle(summary) || deriveLocalTitle(preview);
            const topic = summary.topic || deriveLocalTopic(title || preview);
            const sessionId = String(summary.sessionId || '').trim();
            const hasRenderableState = Boolean(preview || messages.length || sessionId || appState.isStreaming);
            if (!hasRenderableState) return null;
            return {
                sessionId,
                title: title || '新对话',
                topic: topic || '通用对话',
                folder: deriveLocalFolder({ ...(summary || {}), title, topic, preview }),
                preview: preview || '等待第一条回复…',
                updatedAt: new Date().toISOString(),
                model: summary.model || '',
                archived: false,
                pinned: false,
                pending: !sessionId || !appState.sessions.some((item) => item.sessionId === sessionId),
            };
        }

        function composeSidebarSessions() {
            const persisted = Array.isArray(appState.sessions) ? [...appState.sessions] : [];
            const currentCard = buildCurrentSessionCard();
            if (!currentCard) return persisted;
            const currentId = currentCard.sessionId;
            if (currentId) {
                const index = persisted.findIndex((item) => item.sessionId === currentId);
                if (index >= 0) {
                    persisted[index] = {
                        ...persisted[index],
                        ...currentCard,
                        pending: false,
                    };
                    return persisted;
                }
            }
            return [currentCard, ...persisted];
        }

        function selectedMessages() {
            return (appState.currentSession && Array.isArray(appState.currentSession.messages))
                ? appState.currentSession.messages
                : [];
        }

        function composerHasPendingInput() {
            const input = document.getElementById('composer-input');
            return Boolean(String(input?.value || '').trim());
        }

        function isTransientDraftSession(sessionLike = appState.currentSession?.session) {
            const session = sessionLike || null;
            if (!session) return false;
            return Boolean(session.isDraft) && !String(session.sessionId || '').trim();
        }

        function draftCanBeDiscarded() {
            return isTransientDraftSession()
                && !selectedMessages().length
                && !appState.isStreaming
                && !appState.activeRunId
                && !appState.attachments.length
                && !composerHasPendingInput();
        }

        function discardTransientDraftConversation() {
            if (!draftCanBeDiscarded()) return false;
            appState.selectedSessionId = null;
            appState.currentSession = { session: null, messages: [] };
            appState.attachments = [];
            renderAttachments();
            renderMessages();
            renderSidebar();
            return true;
        }

        function currentSessionKey() {
            return String(appState.currentSession?.session?.sessionId || appState.selectedSessionId || '').trim();
        }

        function currentMessageWindowSize(totalMessages) {
            const sessionId = currentSessionKey();
            const total = Array.isArray(totalMessages) ? totalMessages.length : Number(totalMessages || 0);
            if (!sessionId || total <= MESSAGE_WINDOW_DEFAULT) return total;
            const stored = Number(appState.messageWindowBySession[sessionId] || 0);
            if (!Number.isFinite(stored) || stored <= 0) {
                const initial = Math.min(total, MESSAGE_WINDOW_DEFAULT);
                appState.messageWindowBySession[sessionId] = initial;
                return initial;
            }
            return Math.min(total, stored);
        }

        function expandCurrentMessageWindow(step = MESSAGE_WINDOW_STEP) {
            const sessionId = currentSessionKey();
            const messages = selectedMessages();
            if (!sessionId || !messages.length) return;
            appState.messageWindowBySession[sessionId] = Math.min(
                messages.length,
                currentMessageWindowSize(messages.length) + Math.max(1, Number(step) || MESSAGE_WINDOW_STEP),
            );
            scheduleMessagesRender({ force: true });
        }

        function showAllCurrentMessages() {
            const sessionId = currentSessionKey();
            const messages = selectedMessages();
            if (!sessionId || !messages.length) return;
            appState.messageWindowBySession[sessionId] = messages.length;
            scheduleMessagesRender({ force: true });
        }

        function visibleMessagesState(messages) {
            const items = Array.isArray(messages) ? messages : [];
            const total = items.length;
            const windowSize = currentMessageWindowSize(total);
            const hiddenBefore = Math.max(0, total - windowSize);
            return {
                total,
                windowSize,
                hiddenBefore,
                items: hiddenBefore > 0 ? items.slice(hiddenBefore) : items,
            };
        }

        function blockStateKey(messageId, kind, index) {
            return `${String(messageId || '').trim()}::${String(kind || '').trim()}::${Number(index)}`;
        }

        function isBlockExpanded(messageId, kind, index) {
            return !!appState.expandedBlocks[blockStateKey(messageId, kind, index)];
        }

        function setBlockExpanded(messageId, kind, index, expanded) {
            const key = blockStateKey(messageId, kind, index);
            if (!key) return;
            if (expanded) {
                appState.expandedBlocks[key] = true;
            } else {
                delete appState.expandedBlocks[key];
            }
        }

        function renderLargeTextBlock(text, {
            messageId = '',
            kind = 'text',
            index = 0,
            limit = LARGE_TEXT_PREVIEW_LIMIT,
            className = 'message-content',
        } = {}) {
            const value = String(text || '');
            if (!value) return '';
            const safeLimit = Math.max(240, Number(limit) || LARGE_TEXT_PREVIEW_LIMIT);
            const expanded = isBlockExpanded(messageId, kind, index);
            if (expanded || value.length <= safeLimit) {
                return `
                    <div class="${escapeHtml(className)}">${escapeHtml(value)}</div>
                    ${value.length > safeLimit ? `<div class="block-toggle-row"><button class="message-inline-btn" type="button" data-collapse-block="${escapeHtml(blockStateKey(messageId, kind, index))}">收起</button><span class="block-meta">${escapeHtml(formatCompactCount(value.length))} 字</span></div>` : ''}
                `;
            }
            return `
                <div class="${escapeHtml(className)}">${escapeHtml(value.slice(0, safeLimit))}</div>
                <div class="block-fade-mask"></div>
                <div class="block-toggle-row">
                    <button class="message-inline-btn" type="button" data-expand-block="${escapeHtml(blockStateKey(messageId, kind, index))}">展开全部</button>
                    <span class="block-meta">已折叠 ${escapeHtml(formatCompactCount(value.length))} 字</span>
                </div>
            `;
        }

        function renderModelOptions() {
            const select = document.getElementById('model-route');
            const options = Array.isArray(appState.availableModes) && appState.availableModes.length
                ? appState.availableModes
                : [{ id: 'auto', label: 'Auto', description: '按任务自动路由' }];
            select.innerHTML = options.map((item) => `
                <option value="${escapeHtml(item.id)}">${escapeHtml(item.label)}</option>
            `).join('');
            select.value = options.some((item) => item.id === appState.mode) ? appState.mode : 'auto';
        }

        function renderAgentModeOptions() {
            const select = document.getElementById('agent-mode');
            const options = Array.isArray(appState.availableAgentModes) && appState.availableAgentModes.length
                ? appState.availableAgentModes
                : [{ id: 'auto', label: 'Auto', description: '自动使用 agents' }];
            select.innerHTML = options.map((item) => `
                <option value="${escapeHtml(item.id)}">${escapeHtml(item.label)}</option>
            `).join('');
            select.value = options.some((item) => item.id === appState.agentMode) ? appState.agentMode : 'auto';
        }

        function renderAttachments() {
            const list = document.getElementById('attachment-list');
            if (!appState.attachments.length) {
                list.style.display = 'none';
                list.innerHTML = '';
                return;
            }
            list.style.display = 'flex';
            list.innerHTML = appState.attachments.map((item, index) => `
                <span class="attachment-chip">
                    <span>${escapeHtml(item.name || '附件')}</span>
                    <span>${escapeHtml(formatBytes(item.size))}</span>
                    <button type="button" data-attachment-index="${index}">移除</button>
                </span>
            `).join('');
            list.querySelectorAll('[data-attachment-index]').forEach((button) => {
                button.addEventListener('click', () => {
                    const idx = Number(button.dataset.attachmentIndex || '-1');
                    if (idx >= 0) {
                        appState.attachments.splice(idx, 1);
                        renderAttachments();
                        updateTopBadges();
                    }
                });
            });
        }

        function openAttachmentPicker() {
            const input = document.getElementById('file-input');
            if (!input) return;
            try {
                input.value = '';
            } catch (error) {
                console.warn('file input reset failed', error);
            }
            if (typeof input.showPicker === 'function') {
                try {
                    input.showPicker();
                    return;
                } catch (error) {
                    console.warn('file picker showPicker failed', error);
                }
            }
            input.click();
        }

        function insertTextAtCursor(textarea, text) {
            if (!textarea) return;
            const value = String(text || '');
            const start = Number(textarea.selectionStart || 0);
            const end = Number(textarea.selectionEnd || start);
            const original = String(textarea.value || '');
            textarea.value = `${original.slice(0, start)}${value}${original.slice(end)}`;
            const nextPos = start + value.length;
            textarea.selectionStart = nextPos;
            textarea.selectionEnd = nextPos;
            textarea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function updateTopBadges() {

            const routerOk = !!payload.health?.router?.ok;
            const proxyOk = !!payload.health?.proxy?.ok;

            const tmuxState = payload.tmux || {};
            const activeRunCount = activeRuns.length;

            const badgeMap = [

            const imageRoute = payload.routerConfig?.image || 'dashscope-codingplan,kimi-k2.5';

                        : '空闲';

                `Enter 发送，Shift+Enter 换行，输入法候选时不会误发送；权限为 ${formatPermissionLabel(appState.permissionMode)}；协作模式为 ${selectedAgentMode?.label || '关闭协作'}`
                + (appState.attachments.length ? ` · 已附 ${appState.attachments.length} 个文件` : '')
                + '。';

        function updateWorkspaceTitle() {
            const summary = appState.currentSession?.session || null;
            const displayTitle = displaySessionTitle(summary);
            document.getElementById('workspace-title').textContent = displayTitle || '新对话';
            if (summary?.sessionId) {
                document.getElementById('workspace-subtitle').textContent = `${summary.topic || '通用对话'} · 会话 ${summarizeSessionId(summary.sessionId)} · ${summary.model || 'Claude Code'}`;
            } else if (summary && displayTitle) {
                document.getElementById('workspace-subtitle').textContent = `${summary?.topic || deriveLocalTopic(displayTitle)} · 草稿会话`;
            } else {
                document.getElementById('workspace-subtitle').textContent = 'Claude Code 中文工作台';
            }

        function sessionMatchesSearch(sessionItem) {
            if (!appState.search) return true;
            const needle = appState.search.toLowerCase();
            const hay = `${sessionItem.title || ''}\n${sessionItem.preview || ''}`.toLowerCase();
            return hay.includes(needle);
        }

        function isInternalSession(sessionItem) {
            const title = String(sessionItem?.title || '').trim();
            const preview = String(sessionItem?.preview || '').trim();
            const model = String(sessionItem?.model || '').trim();
            const probes = `${title}\n${preview}`.trim();
            if (model === '<synthetic>') return true;
            if (!probes) return false;
            return (
                ((/^\[route:/i.test(probes) || /^(reply with|say only|echo)\b/i.test(probes)) && /[A-Z0-9_]{8,}/.test(probes))
                || /^create a file named .*tmp-claude/i.test(probes)
                || /^update .*tmp-claude/i.test(probes)
            );
        }

        function visibleSessions() {
            return composeSidebarSessions().filter((item) => {
                if (!appState.showInternal && isInternalSession(item)) return false;
                if (!appState.search) return true;
                const needle = appState.search.toLowerCase();
                const hay = `${item.title || ''}\n${item.preview || ''}\n${item.topic || ''}\n${deriveLocalFolder(item)}`.toLowerCase();
                return hay.includes(needle);
            });
        }

        function folderSortWeight(label) {
            if (label === 'Operations') return -20;
            if (label === 'Claude Code') return -10;
            if (label === '未归类') return 20;
            return 0;
        }

        function groupedSessions(items) {
            const groups = new Map();
            (appState.folderRegistry || []).forEach((label) => {
                const folderLabel = normalizeFolderName(label);
                if (folderLabel && !groups.has(folderLabel)) {
                    groups.set(folderLabel, []);
                }
            });
            items.forEach((item) => {
                const key = deriveLocalFolder(item);
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(normalizeSessionSummary(item));
            });
            return Array.from(groups.entries())
                .map(([label, folderItems]) => ({
                    label,
                    collapsed: !!appState.folderCollapse[label],
                    items: folderItems,
                }))
                .sort((left, right) => {
                    const weightDiff = folderSortWeight(left.label) - folderSortWeight(right.label);
                    if (weightDiff !== 0) return weightDiff;
                    return left.label.localeCompare(right.label, 'zh-Hans-CN');
                });
        }

        function cacheSessionDetail(sessionId, session, messages) {
            const key = String(sessionId || session?.sessionId || '').trim();
            if (!key) return;
            appState.sessionDetailCache[key] = {
                updatedAt: String(session?.updatedAt || ''),
                session: { ...(session || {}) },
                messages: Array.isArray(messages) ? messages : [],
            };
            const keys = Object.keys(appState.sessionDetailCache);
            if (keys.length > 24) {
                keys
                    .sort((left, right) => {
                        const leftTime = String(appState.sessionDetailCache[left]?.updatedAt || '');
                        const rightTime = String(appState.sessionDetailCache[right]?.updatedAt || '');
                        return leftTime.localeCompare(rightTime);
                    })
                    .slice(0, keys.length - 24)
                    .forEach((keyToDrop) => {
                        delete appState.sessionDetailCache[keyToDrop];
                    });
            }
        }

        function updateSessionLocally(sessionId, patch) {
            const key = String(sessionId || '').trim();
            if (!key) return null;
            let updatedSession = null;
            appState.sessions = appState.sessions.map((item) => {
                if (String(item.sessionId || '') !== key) return item;
                updatedSession = normalizeSessionSummary({
                    ...item,
                    ...patch,
                    updatedAt: patch.updatedAt || new Date().toISOString(),
                });
                return updatedSession;
            });
            if (updatedSession && appState.currentSession?.session?.sessionId === key) {
                appState.currentSession.session = {
                    ...appState.currentSession.session,
                    ...updatedSession,
                };
            }
            const cached = appState.sessionDetailCache[key];
            if (updatedSession && cached) {
                cached.session = {
                    ...cached.session,
                    ...updatedSession,
                };
                cached.updatedAt = String(updatedSession.updatedAt || cached.updatedAt || '');
            }
            return updatedSession;
        }

        function removeSessionLocally(sessionId) {
            const key = String(sessionId || '').trim();
            if (!key) return;
            appState.sessions = appState.sessions.filter((item) => String(item.sessionId || '') !== key);
            delete appState.sessionDetailCache[key];
            delete appState.sessionActionPending[key];
            if (appState.currentSession?.session?.sessionId === key) {
                appState.currentSession = { session: null, messages: [] };
            }
        }

        function registerFolderLocally(folderName) {
            const normalized = normalizeFolderName(folderName);
            if (!normalized) return;
            if (!appState.folderRegistry.includes(normalized)) {
                appState.folderRegistry = [...appState.folderRegistry, normalized];
            }
        }

        function renameFolderLocally(oldName, newName) {
            const oldNormalized = normalizeFolderName(oldName);
            const newNormalized = normalizeFolderName(newName);
            if (!oldNormalized || !newNormalized) return;
            appState.folderRegistry = appState.folderRegistry
                .map((item) => normalizeFolderName(item) === oldNormalized ? newNormalized : normalizeFolderName(item))
                .filter(Boolean)
                .filter((item, index, list) => list.indexOf(item) === index);
            appState.sessions = appState.sessions.map((item) => {
                if (deriveLocalFolder(item) !== oldNormalized) return item;
                return normalizeSessionSummary({
                    ...item,
                    folder: newNormalized,
                });
            });
            if (appState.currentSession?.session && deriveLocalFolder(appState.currentSession.session) === oldNormalized) {
                appState.currentSession.session = normalizeSessionSummary({
                    ...appState.currentSession.session,
                    folder: newNormalized,
                });
            }
            Object.keys(appState.sessionDetailCache).forEach((sessionId) => {
                const cached = appState.sessionDetailCache[sessionId];
                if (cached?.session && deriveLocalFolder(cached.session) === oldNormalized) {
                    cached.session = normalizeSessionSummary({
                        ...cached.session,
                        folder: newNormalized,
                    });
                }
            });
        }

        async function createFolder(folderName) {
            const normalized = normalizeFolderName(folderName);
            if (!normalized) {
                throw new Error('请输入文件夹名称');
            }
            registerFolderLocally(normalized);
            renderSidebar();
            try {
                const payload = await apiJson('/claude-console/folders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: normalized }),
                });
                appState.folderRegistry = Array.isArray(payload.folders)
                    ? payload.folders.map((item) => normalizeFolderName(item)).filter(Boolean)
                    : appState.folderRegistry;
                renderSidebar();
            } catch (error) {
                appState.folderRegistry = appState.folderRegistry.filter((item) => item !== normalized);
                renderSidebar();
                throw error;
            }
        }

        async function renameFolder(oldName, newName) {
            const oldNormalized = normalizeFolderName(oldName);
            const newNormalized = normalizeFolderName(newName);
            if (!oldNormalized || !newNormalized) {
                throw new Error('请输入文件夹名称');
            }
            const backupRegistry = [...appState.folderRegistry];
            const backupSessions = deepClone(appState.sessions);
            const backupCurrent = deepClone(appState.currentSession);
            renameFolderLocally(oldNormalized, newNormalized);
            renderSidebar();
            renderMessages();
            try {
                const sessionIds = appState.sessions
                    .filter((item) => deriveLocalFolder(item) === newNormalized)
                    .map((item) => item.sessionId)
                    .filter(Boolean);
                const payload = await apiJson('/claude-console/folders/rename', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        oldName: oldNormalized,
                        newName: newNormalized,
                        sessionIds,
                    }),
                });
                appState.folderRegistry = Array.isArray(payload.folders)
                    ? payload.folders.map((item) => normalizeFolderName(item)).filter(Boolean)
                    : appState.folderRegistry;
                scheduleBackgroundSync();
            } catch (error) {
                appState.folderRegistry = backupRegistry;
                appState.sessions = backupSessions;
                appState.currentSession = backupCurrent;
                renderSidebar();
                renderMessages();
                throw error;
            }
        }

        function handleSidebarClick(event) {
            const revealButton = event.target.closest('[data-reveal-path]');
            if (revealButton) {
                noteSidebarInteraction(1000);
                revealPath(revealButton.dataset.revealPath || '').catch(handleError);
                return;
            }

            const automationDeleteButton = event.target.closest('[data-delete-automation]');
            if (automationDeleteButton) {
                freezeSidebarFor(1600);
                promptDeleteAutomation(
                    automationDeleteButton.dataset.deleteAutomation || '',
                    automationDeleteButton.dataset.deleteSource || 'codex-automation',
                );
                return;
            }

            const folderToggle = event.target.closest('[data-folder-toggle]');
            if (folderToggle) {
                noteSidebarInteraction(1200);
                toggleFolderCollapsed(folderToggle.dataset.folderToggle || '');
                return;
            }

            const folderRenameButton = event.target.closest('[data-folder-rename]');
            if (folderRenameButton) {
                freezeSidebarFor(1600);
                promptRenameFolder(folderRenameButton.dataset.folderRename || '');
                return;
            }

            const actionButton = event.target.closest('.session-action-btn[data-action]');
            if (actionButton) {
                freezeSidebarFor(1800);
                const sessionId = actionButton.dataset.sessionId || '';
                const action = actionButton.dataset.action || '';
                if (!sessionId || !action || isSessionActionBusy(sessionId)) return;
                const session = appState.sessions.find((item) => item.sessionId === sessionId);
                const currentSymbol = String(actionButton.textContent || '').trim();
                if (action === 'pin') {
                    const currentlyPinned = currentSymbol === '★';
                    saveSessionMeta(sessionId, { pinned: !currentlyPinned }, { action: 'pin' }).catch(handleError);
                    return;
                }
                if (action === 'archive') {
                    const currentlyArchived = currentSymbol === '↺';
                    saveSessionMeta(sessionId, { archived: !currentlyArchived }, { action: 'archive' }).catch(handleError);
                    return;
                }
                if (action === 'rename') {
                    promptRenameSession(sessionId);
                    return;
                }
                if (action === 'delete') {
                    promptDeleteSession(sessionId);
                }
                return;
            }

            const sessionNode = event.target.closest('.session-item[data-session-id]');
            if (!sessionNode) return;
            const sessionId = sessionNode.dataset.sessionId || '';
            if (sessionId) {
                freezeSidebarFor(1000);
                loadSession(sessionId).catch(handleError);
            }
        }
